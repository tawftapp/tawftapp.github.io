name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.5"
          channel: stable
          cache: true

      - name: Install dependencies
        run: dart pub get

      - name: Verify
        run: |
          dart analyze
          dart test

      - name: Install Jaspr CLI
        run: dart pub global activate jaspr_cli 0.22.4

      - name: Build static site
        run: |
          REPOSITORY_NAME="${GITHUB_REPOSITORY#*/}"
          if [[ "${REPOSITORY_NAME,,}" == "${GITHUB_REPOSITORY_OWNER,,}.github.io" ]]; then
            BASE_PATH="/"
          else
            BASE_PATH="/${REPOSITORY_NAME}/"
          fi
          dart pub global run jaspr_cli:jaspr build \
            --dart-define="BASE_PATH=${BASE_PATH}"
          touch build/jaspr/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/jaspr

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
