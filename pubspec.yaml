name: tawft
description: "There's A Widget For That — Premium Flutter Widget Gallery"
version: 1.0.0
publish_to: none

environment:
  sdk: ^3.8.0

dependencies:
  http: ^1.6.0
  supabase: ^2.13.0
  jaspr: ^0.22.4
  jaspr_riverpod: 0.4.4
  jaspr_router: 0.8.1

dev_dependencies:
  jaspr_builder: ^0.22.4
  build_web_compilers: 4.6.0
  build_runner: ^2.4.0
  lints: ^5.1.0
  test: ^1.31.1

# jaspr_riverpod 0.4.5 currently relies on the Riverpod 3.2 scheduler API.
dependency_overrides:
  riverpod: 3.2.1

jaspr:
  mode: static
  flutter: plugins
